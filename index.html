<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome • Pjila’si</title>

<style>
:root{
  --bg-url: url("migmaq.jpg");

  /* Fond général plus clair */
  --overlay-top: rgba(90,60,30,.25);
  --overlay-bottom: rgba(40,25,15,.55);

  --text: #F7F4EF;

  /* Palette joyeuse pour les menus */
  --menu-bg: #2f7e83;
  --menu-bg-hover: #3b9aa0;
  --menu-border: #7cc5c9;

  --shadow: 0 14px 38px rgba(0,0,0,.35);
  --gap: 18px;
  --panel-width: min(600px, 92vw);

  --font: ui-sans-serif, system-ui, -apple-system,
          "Segoe UI", Roboto, Arial;
}

*{box-sizing:border-box;}
html, body{
  margin:0;
  min-height:100%;
}

body{
  font-family:var(--font);
  color:var(--text);
  background:
    linear-gradient(180deg,var(--overlay-top),var(--overlay-bottom)),
    var(--bg-url) 65% center / cover no-repeat fixed;
}

/* ===== Layout principal ===== */
.layout{
  display:flex;
  max-width:1200px;
  margin:auto;
  padding:34px 18px 80px;
  gap:40px;
}

/* ===== Logos ===== */
aside.logos{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:16px;
}

aside.logos a{
  display:block;
  background:#fff;
  padding:10px;
  border-radius:12px;
  box-shadow:var(--shadow);
}

aside.logos img{
  display:block;
  max-width:90px; /* -25 % */
  height:auto;
}

/* ===== Panneau principal ===== */
.panel{
  width:var(--panel-width);
  display:flex;
  flex-direction:column;
  gap:16px;
}

header{
  text-align:center;
  padding:18px;
  background:#2f5f63;
  border-radius:18px;
  box-shadow:var(--shadow);
}

h1{
  margin:0;
  font-size:clamp(34px,4vw,56px);
}

h2{
  margin:8px 0 0;
  font-size:clamp(22px,2.5vw,30px);
}

.subtitle{
  margin-top:16px;
  font-size:18px;
  line-height:1.6;
  background:#3f7d82;
  padding:12px 14px;
  border-radius:14px;
}

/* ===== Menu vidéos ===== */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:var(--gap);
}

.card{
  border-radius:16px;
  padding:18px;
  background:var(--menu-bg);
  border:1px solid var(--menu-border);
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}

.card:hover{
  transform:translateY(-3px);
  background:var(--menu-bg-hover);
}

/* Titres bien blancs */
.card-title{
  font-size:18px;
  font-weight:850;
  margin:0;
  color:#ffffff;
}

.details{
  margin-top:10px;
  padding-left:18px;
  opacity:0;
  max-height:0;
  overflow:hidden;
  transition:.25s;
}

.card:hover .details{
  opacity:1;
  max-height:600px;
}

.details li{
  margin:6px 0;
  line-height:1.45;
}

/* Accents jaunes */
.details strong{
  color:#FCD34D;
  font-weight:800;
}

/* ===== Modale ===== */
dialog{
  border:none;
  border-radius:18px;
  padding:0;
  width:min(900px,95vw);
  background:rgba(20,40,45,.95);
}

dialog::backdrop{
  background:rgba(0,0,0,.65);
}

.modal-body{
  padding:40px;
  color:#ffffff;
  text-align:center;
  font-size:18px;
}

/* ===== Crédit photo ===== */
.photo-credit{
  position:fixed;
  bottom:12px;
  right:14px;
  background:rgba(0,0,0,.45);
  color:#ffffff;
  font-size:12px;
  padding:8px 10px;
  border-radius:10px;
  backdrop-filter:blur(6px);
  box-shadow:0 6px 22px rgba(0,0,0,.35);
  z-index:999;
}

/* ===== Responsive ===== */
@media (max-width:900px){
  .layout{
    flex-direction:column;
    align-items:center;
  }
  aside.logos{
    flex-direction:row;
    justify-content:center;
  }
}
</style>
</head>

<body>

<div class="layout">

  <!-- Logos -->
  <aside class="logos">
    <a href="https://www.lchsys.org" target="_blank" rel="noopener">
      <img src="LCHS.png" alt="LCHS">
    </a>
    <a href="https://www.cisss-gaspesie.gouv.qc.ca" target="_blank" rel="noopener">
      <img src="CISSS.png" alt="CISSS">
    </a>
    <a href="https://www.listuguj.ca" target="_blank" rel="noopener">
      <img src="LMG.png" alt="Listuguj Mi'gmaq Government">
    </a>
    <a href="https://gesgapegiag.ca" target="_blank" rel="noopener">
      <img src="Gesgapegiag.jpg" alt="Gesgapegiag">
    </a>
  </aside>

  <!-- Menu vidéos -->
  <main class="panel">
    <header>
      <h1>Welcome</h1>
      <h2>Pjila’si</h2>
      <p class="subtitle">
        Find your way around the hospital and let Pamela Isaac, from Listuguj,
        accompany you to your appointment.
      </p>
    </header>

    <section class="grid" id="grid"></section>
  </main>

</div>

<dialog id="modal">
  <div class="modal-body">
    🎥 <strong>Video coming soon</strong><br><br>
    This video is currently in production.
  </div>
</dialog>

<div class="photo-credit">
  Photo source:<br>
  <strong>Tracy Metallic</strong>, Listuguj
</div>

<script>
const SECTIONS = [
  { title:"Admission Desk", items:[] },
  { title:"Emergency", items:[] },
  {
    title:"Radiology",
    items:[
      "Radiology","Mammography","Scan",
      "Echography","Bone Densitometry","Magnetic Resonance"
    ]
  },
  {
    title:"Day Medicine and Samples",
    items:[
      "Samples and Tests",
      "Day Appointments with a Specialist",
      "Intravesical Surgery (Cancer Patients)"
    ]
  },
  {
    title:"Operating Room including Day Surgeries",
    items:["Pre-op","Operating Room","Day Surgeries"]
  },
  { title:"Oncology", items:[] },
  {
    title:"Others",
    items:[
      "<strong>Appointment Forms</strong>",
      "<strong>Second Floor:</strong> ENT, ECG, Respiratory Therapy, Occupational Therapy, Dermatology, Ophthalmology",
      "<strong>Ground Floor:</strong> Audiology and Orthopedics",
      "<strong>Third and Fourth Floors:</strong> Mental Health, Lab, Oncology"
    ]
  }
];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");

SECTIONS.forEach(section=>{
  const card = document.createElement("button");
  card.className = "card";
  card.innerHTML = `
    <h3 class="card-title">${section.title}</h3>
    ${section.items.length
      ? `<ul class="details">${section.items.map(i=>`<li>${i}</li>`).join("")}</ul>`
      : ""}
  `;
  card.onclick = () => modal.showModal();
  grid.appendChild(card);
});
</script>

</body>
</html>
